<!DOCTYPE html>
<html>
<head>
    <title>Zodiac Sign Finder</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #6a11cb;
            border-radius: 8px;
        }

        button {
            padding: 10px 20px;
            background: #6a11cb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #2575fc;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            color: #2575fc;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .show {
            animation: pop 0.5s ease;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Zodiac Finder</h1>

    <input type="number" id="month" placeholder="Enter Month (1-12)">
    <input type="number" id="date" placeholder="Enter Date">

    <button onclick="findZodiac()">Find Sign</button>

    <h2 id="result"></h2>

    <img id="zodiacImg" width="120" style="margin-top:10px;">

</div>

<!-- ONLINE SOUND (WORKING CLICK SOUND) -->
<audio id="sound">
    <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>

function findZodiac() {

    let month = parseInt(document.getElementById("month").value);
    let date = parseInt(document.getElementById("date").value);

    let zodiac = "";
    let image = "";

    if ((month == 3 && date >= 21) || (month == 4 && date <= 19)) {
        zodiac = "Aries ♈";
        image = "https://i.imgur.com/5b6XK7m.png";
    }
    else if ((month == 4 && date >= 20) || (month == 5 && date <= 20)) {
        zodiac = "Taurus ♉";
        image = "https://i.imgur.com/3QZQZ3b.png";
    }
    else if ((month == 5 && date >= 21) || (month == 6 && date <= 20)) {
        zodiac = "Gemini ♊";
        image = "https://i.imgur.com/8k3Qz2L.png";
    }
    else if ((month == 6 && date >= 21) || (month == 7 && date <= 22)) {
        zodiac = "Cancer ♋";
        image = "https://i.imgur.com/1Q9Z1xF.png";
    }
    else if ((month == 7 && date >= 23) || (month == 8 && date <= 22)) {
        zodiac = "Leo ♌";
        image = "https://i.imgur.com/9vR7x0K.png";
    }
    else if ((month == 8 && date >= 23) || (month == 9 && date <= 22)) {
        zodiac = "Virgo ♍";
        image = "https://i.imgur.com/6kQx2cP.png";
    }
    else if ((month == 9 && date >= 23) || (month == 10 && date <= 22)) {
        zodiac = "Libra ♎";
        image = "https://i.imgur.com/2xQz8nD.png";
    }
    else if ((month == 10 && date >= 23) || (month == 11 && date <= 21)) {
        zodiac = "Scorpio ♏";
        image = "https://i.imgur.com/7mQz1vA.png";
    }
    else if ((month == 11 && date >= 22) || (month == 12 && date <= 21)) {
        zodiac = "Sagittarius ♐";
        image = "https://i.imgur.com/4nQz9kS.png";
    }
    else if ((month == 12 && date >= 22) || (month == 1 && date <= 19)) {
        zodiac = "Capricorn ♑";
        image = "https://i.imgur.com/9pQz3xB.png";
    }
    else if ((month == 1 && date >= 20) || (month == 2 && date <= 18)) {
        zodiac = "Aquarius ♒";
        image = "https://i.imgur.com/1xQz6vC.png";
    }
    else if ((month == 2 && date >= 19) || (month == 3 && date <= 20)) {
        zodiac = "Pisces ♓";
        image = "https://i.imgur.com/5xQz2pM.png";
    }
    else {
        zodiac = "Invalid Date";
        image = "";
    }

    // SHOW TEXT
    let result = document.getElementById("result");
    result.innerHTML = "Your Zodiac Sign is: " + zodiac;
    result.classList.add("show");

    // SHOW IMAGE
    document.getElementById("zodiacImg").src = image;

    // SOUND FIX (online + click safe)
    let sound = document.getElementById("sound");
    sound.currentTime = 0;
    sound.play().catch(() => {
        console.log("Sound blocked by browser");
    });
}

</script>

</body>
</html>
